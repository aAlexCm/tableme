<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>TableMe · Digital invitation</title>
  <meta property="og:title" content="TableMe · Digital invitation" />
  <meta property="og:description" content="A digital invitation to send directly to your wedding guests." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://tableme.app/invitation" />
  <meta property="og:image" content="https://tableme.app/og-image.png" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="TableMe · Digital invitation" />
  <meta name="twitter:description" content="A digital invitation to send directly to your wedding guests." />
  <meta name="twitter:image" content="https://tableme.app/og-image.png" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="admin-theme">
  <div class="page page-wide invitation-page">
    <div id="lang-switcher-mount" class="lang-switcher-mount"></div>

    <div id="not-found" class="card" hidden>
      <h2 data-i18n="weddingNotFoundTitle">Mariage introuvable</h2>
      <p class="muted" data-i18n="weddingNotFoundDesc">Ce lien n'est pas valide ou ce mariage a été supprimé.</p>
    </div>

    <div id="connection-error" class="card" hidden>
      <h2 data-i18n="connectionErrorTitle">Connexion impossible</h2>
      <p class="muted" data-i18n="connectionErrorDesc">Nous n'avons pas pu joindre le serveur. Vérifiez votre connexion internet, puis réessayez.</p>
      <button type="button" class="secondary" id="connection-error-retry" data-i18n="connectionErrorRetry">Réessayer</button>
    </div>

    <div id="invitation-content" hidden>
      <nav class="admin-nav admin-nav-stacked">
        <strong id="invitation-wedding-name"></strong>
        <div class="admin-nav-actions">
          <a href="#" id="invitation-back-link" data-i18n="backToAdminLink">&larr; Retour</a>
        </div>
      </nav>

      <div class="invitation-workspace">
        <aside class="invitation-toolbox">
          <p class="invitation-toolbox-title" data-i18n="invitationToolboxTitle">Outils</p>
          <div class="invitation-toolbox-tools">
            <button type="button" class="invitation-tool-btn" id="invitation-add-text-btn">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>
              <span data-i18n="invitationAddTextBtn">Texte</span>
            </button>
          </div>
        </aside>

        <div class="invitation-canvas-area">
          <div class="invitation-phone-frame">
            <iframe class="invitation-phone-screen" id="invitation-phone-screen" title="Aperçu de l'invitation"></iframe>
          </div>

          <div class="invitation-link-row">
            <a class="invitation-link-display" id="invitation-link-display" href="#" target="_blank" rel="noopener"></a>
            <button type="button" class="icon-btn" id="invitation-copy-link-btn" data-i18n-aria-label="invitationCopyLinkLabel" aria-label="Copier le lien"></button>
            <button type="button" class="icon-btn" id="invitation-share-link-btn" data-i18n-aria-label="invitationShareLinkLabel" aria-label="Partager le lien" hidden></button>
          </div>
        </div>

        <aside class="invitation-text-settings" id="invitation-text-settings" hidden>
          <div class="invitation-text-settings-header">
            <p class="invitation-text-settings-title" data-i18n="invitationTextSettingsTitle">Paramètres du texte</p>
            <button type="button" class="icon-btn" id="invitation-settings-close-btn" data-i18n-aria-label="invitationCloseSettingsLabel" aria-label="Fermer">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg>
            </button>
          </div>

          <div class="invitation-text-settings-section">
            <label class="invitation-text-settings-label" data-i18n="invitationFontLabel" for="invitation-font-select">Police</label>
            <select id="invitation-font-select">
              <option value="Georgia, 'Times New Roman', serif">Georgia</option>
              <option value="'Playfair Display', serif">Playfair Display</option>
              <option value="'Cormorant Garamond', serif">Cormorant Garamond</option>
              <option value="'Parisienne', cursive">Parisienne</option>
              <option value="'Inter', sans-serif">Inter</option>
            </select>
          </div>

          <div class="invitation-text-settings-section">
            <label class="invitation-text-settings-label" data-i18n="invitationFontSizeLabel" for="invitation-size-range">Taille de police</label>
            <div class="invitation-text-settings-size-row">
              <input type="range" id="invitation-size-range" min="8" max="120" />
              <input type="number" id="invitation-size-number" min="8" max="120" />
            </div>
          </div>

          <div class="invitation-text-settings-section invitation-text-settings-row">
            <button type="button" class="invitation-text-settings-toggle" id="invitation-bold-btn" data-i18n-aria-label="invitationBoldLabel" aria-label="Gras"><b>B</b></button>
            <button type="button" class="invitation-text-settings-toggle" id="invitation-italic-btn" data-i18n-aria-label="invitationItalicLabel" aria-label="Italique"><i>I</i></button>
            <button type="button" class="invitation-text-settings-toggle" id="invitation-underline-btn" data-i18n-aria-label="invitationUnderlineLabel" aria-label="Souligné"><u>S</u></button>
            <input type="color" id="invitation-color-input" data-i18n-aria-label="invitationTextColorLabel" aria-label="Couleur du texte" />
          </div>

          <div class="invitation-text-settings-section invitation-text-settings-row">
            <button type="button" class="invitation-text-settings-toggle" id="invitation-align-left-btn" data-i18n-aria-label="invitationAlignLeftLabel" aria-label="Aligner à gauche">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg>
            </button>
            <button type="button" class="invitation-text-settings-toggle" id="invitation-align-center-btn" data-i18n-aria-label="invitationAlignCenterLabel" aria-label="Centrer">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
            </button>
            <button type="button" class="invitation-text-settings-toggle" id="invitation-align-right-btn" data-i18n-aria-label="invitationAlignRightLabel" aria-label="Aligner à droite">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="9" y1="12" x2="21" y2="12"/><line x1="6" y1="18" x2="21" y2="18"/></svg>
            </button>
          </div>

          <button type="button" class="invitation-text-settings-delete" id="invitation-delete-widget-btn" data-i18n="invitationDeleteWidgetBtn">Supprimer</button>
        </aside>
      </div>
    </div>
  </div>

  <script type="module" src="js/invitation.js"></script>
</body>
</html>
