<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>TableMe · Digital invitation</title>
  <meta property="og:title" content="TableMe · Digital invitation" />
  <meta property="og:description" content="A digital invitation to send directly to your wedding guests." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://tableme.app/invitation" />
  <meta property="og:image" content="https://tableme.app/og-image.png" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="TableMe · Digital invitation" />
  <meta name="twitter:description" content="A digital invitation to send directly to your wedding guests." />
  <meta name="twitter:image" content="https://tableme.app/og-image.png" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Parisienne&family=Monsieur+La+Doulaise&family=Pinyon+Script&family=Luxurious+Script&family=Raleway:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Jost:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="admin-theme">
  <div class="page page-wide invitation-page">
    <div id="lang-switcher-mount" class="lang-switcher-mount"></div>

    <div id="not-found" class="card" hidden>
      <h2 data-i18n="weddingNotFoundTitle">Mariage introuvable</h2>
      <p class="muted" data-i18n="weddingNotFoundDesc">Ce lien n'est pas valide ou ce mariage a été supprimé.</p>
    </div>

    <div id="connection-error" class="card" hidden>
      <h2 data-i18n="connectionErrorTitle">Connexion impossible</h2>
      <p class="muted" data-i18n="connectionErrorDesc">Nous n'avons pas pu joindre le serveur. Vérifiez votre connexion internet, puis réessayez.</p>
      <button type="button" class="secondary" id="connection-error-retry" data-i18n="connectionErrorRetry">Réessayer</button>
    </div>

    <div id="invitation-content" hidden>
      <nav class="admin-nav admin-nav-stacked">
        <strong id="invitation-wedding-name"></strong>
        <div class="admin-nav-actions">
          <a href="#" id="invitation-back-link" data-i18n="backToAdminLink">&larr; Retour</a>
        </div>
      </nav>

      <div class="invitation-workspace">
        <aside class="invitation-toolbox">
          <p class="invitation-toolbox-title" data-i18n="invitationToolboxTitle">Outils</p>
          <div class="invitation-toolbox-tools">
            <button type="button" class="invitation-tool-btn" id="invitation-add-text-btn">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>
              <span data-i18n="invitationAddTextBtn">Texte</span>
            </button>
            <button type="button" class="invitation-tool-btn" id="invitation-add-qr-btn">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 17h3v3h-3z"/><path d="M21 14v3"/><path d="M14 21h3"/></svg>
              <span data-i18n="invitationAddQrBtn">QR code</span>
            </button>
            <button type="button" class="invitation-tool-btn" id="invitation-add-divider-btn">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="2" y1="12" x2="9" y2="12"/><circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"/><line x1="15" y1="12" x2="22" y2="12"/></svg>
              <span data-i18n="invitationAddDividerBtn">Séparateur</span>
            </button>
            <button type="button" class="invitation-tool-btn" id="invitation-add-icon-btn">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-4.35-9.5-8.5C1 9 2 5 5.5 4 8 3.3 10 4.5 12 7c2-2.5 4-3.7 6.5-3 3.5 1 4.5 5 3 8.5C19 16.65 12 21 12 21z"/></svg>
              <span data-i18n="invitationAddIconBtn">Icône</span>
            </button>
            <button type="button" class="invitation-tool-btn" id="invitation-add-image-btn">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
              <span data-i18n="invitationAddImageBtn">Image</span>
            </button>
          </div>
        </aside>

        <div class="invitation-image-menu" id="invitation-image-menu" hidden>
          <button type="button" class="invitation-image-menu-item" id="invitation-image-upload-btn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
            <span data-i18n="invitationImageFromDevice">Depuis l'appareil</span>
          </button>
          <button type="button" class="invitation-image-menu-item" id="invitation-image-paste-btn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M9 4H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2"/><path d="M9 14l2 2 4-4"/></svg>
            <span data-i18n="invitationImagePaste">Coller (Ctrl+V)</span>
          </button>
          <div class="invitation-image-menu-url">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 14a3.5 3.5 0 0 0 5 0l3-3a3.5 3.5 0 0 0-5-5l-1 1"/><path d="M14 10a3.5 3.5 0 0 0-5 0l-3 3a3.5 3.5 0 0 0 5 5l1-1"/></svg>
            <input type="text" id="invitation-image-url-input" data-i18n-placeholder="invitationImageUrlPlaceholder" placeholder="https://..." />
            <button type="button" id="invitation-image-url-btn" data-i18n="invitationImageUrlBtn">OK</button>
          </div>
        </div>
        <input type="file" accept="image/*" id="invitation-image-file-input" hidden />

        <div class="invitation-canvas-area">
          <div class="invitation-bg-field">
            <label for="invitation-bg-color-input" data-i18n="invitationBgColorLabel">Couleur de la page</label>
            <span class="invitation-bg-swatch">
              <svg viewBox="0 0 24 24" width="22" height="22">
                <path d="M5 9 L19 9 L17.3 19.2a2 2 0 0 1-2 1.6h-6.6a2 2 0 0 1-2-1.6L5 9Z" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linejoin="round"/>
                <ellipse cx="12" cy="9" rx="7" ry="2.1" fill="none" stroke="#6b7280" stroke-width="1.5"/>
                <ellipse id="invitation-bg-swatch-fill" cx="12" cy="9" rx="5.4" ry="1.3" stroke="#6b7280" stroke-width="0.6"/>
              </svg>
              <input type="color" id="invitation-bg-color-input" value="#ffffff" />
            </span>
            <input type="text" id="invitation-bg-hex-input" class="color-hex-input" maxlength="7" spellcheck="false" />
          </div>

          <div class="invitation-sheet" id="invitation-sheet">
            <div class="invitation-sheet-content" id="invitation-sheet-content"></div>
          </div>

          <div class="invitation-actions">
            <button type="button" class="secondary" id="invitation-download-btn">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
              <span data-i18n="invitationDownloadPdfBtn">Télécharger en PDF</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="invitation-text-toolbar" id="invitation-text-toolbar" hidden>
    <button type="button" class="icon-btn" id="invitation-bold-btn"><b>B</b></button>
    <button type="button" class="icon-btn" id="invitation-italic-btn"><i>I</i></button>
    <button type="button" class="icon-btn" id="invitation-align-left-btn"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="14" y2="12"/><line x1="4" y1="18" x2="17" y2="18"/></svg></button>
    <button type="button" class="icon-btn" id="invitation-align-center-btn"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="5.5" y1="18" x2="18.5" y2="18"/></svg></button>
    <button type="button" class="icon-btn" id="invitation-align-right-btn"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="10" y1="12" x2="20" y2="12"/><line x1="7" y1="18" x2="20" y2="18"/></svg></button>
    <select id="invitation-font-select"></select>
    <select id="invitation-divider-style-select"></select>
    <select id="invitation-icon-symbol-select"></select>
    <select id="invitation-qr-body-select"></select>
    <select id="invitation-qr-corner-select"></select>
    <input type="color" id="invitation-color-input" />
    <input type="text" id="invitation-hex-input" class="color-hex-input" maxlength="7" spellcheck="false" />
    <span class="icon-number-field">
      <span class="icon-number-field-icon"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"/><polyline points="8 8 4 12 8 16"/><polyline points="16 8 20 12 16 16"/></svg></span>
      <input type="number" id="invitation-size-input" min="8" max="200" />
    </span>
    <span class="icon-number-field">
      <span class="icon-number-field-icon"><svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><rect x="3" y="10" width="18" height="4" rx="1.5"/></svg></span>
      <input type="number" id="invitation-divider-thickness-input" min="1" max="12" />
    </span>
    <span class="icon-number-field">
      <span class="icon-number-field-icon"><svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><circle cx="7" cy="15" r="2.6"/><circle cx="16" cy="10" r="4.6"/></svg></span>
      <input type="number" id="invitation-divider-ornament-size-input" min="8" max="60" />
    </span>
    <button type="button" class="icon-btn" id="invitation-duplicate-btn"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
    <button type="button" class="icon-btn icon-btn-danger" id="invitation-delete-text-btn"></button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.9.2/lib/qr-code-styling.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script type="module" src="js/invitation.js"></script>
</body>
</html>
