<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administration - Mariages</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page">
    <nav class="admin-nav">
      <strong>Administration</strong>
      <a href="index.html">Voir la page invité &rarr;</a>
    </nav>

    <header class="hero">
      <h1>Gérer les mariages</h1>
      <p>Créez un mariage, ajoutez vos invités et leur numéro de table</p>
    </header>

    <div class="card">
      <h2>Nouveau mariage</h2>
      <form id="wedding-form" class="inline-form">
        <input type="text" id="wedding-name" placeholder="Nom du mariage (ex: Mariage de Léa & Tom)" required />
        <input type="date" id="wedding-date" />
        <button type="submit">Créer</button>
      </form>
    </div>

    <div class="card">
      <h2>Mariages</h2>
      <ul class="wedding-list" id="wedding-list"></ul>
      <p class="empty-state" id="wedding-empty" hidden>Aucun mariage créé pour le moment.</p>
    </div>

    <div class="card" id="guests-card" hidden>
      <h2 id="guests-title">Invités</h2>

      <div class="link-box">
        <input type="text" id="guest-link" readonly />
        <button type="button" class="secondary" id="copy-link">Copier</button>
      </div>

      <form id="guest-form" class="inline-form" style="margin-top: 20px">
        <input type="text" id="guest-name" placeholder="Nom et prénom de l'invité" required />
        <input type="text" id="guest-table" placeholder="N° de table" required />
        <button type="submit">Ajouter</button>
      </form>

      <ul class="guest-list" id="guest-list" style="margin-top: 16px"></ul>
      <p class="empty-state" id="guest-empty" hidden>Aucun invité ajouté pour le moment.</p>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
