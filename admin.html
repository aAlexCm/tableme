<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TableMe · Administration</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page">
    <div id="lang-switcher-mount" class="lang-switcher-mount"></div>

    <div id="admin-content">
      <nav class="admin-nav">
        <strong data-i18n="adminNavLabel">Administration</strong>
        <a href="index.html" data-i18n="adminNavGuestLink">Voir la page invité &rarr;</a>
      </nav>

      <header class="hero">
        <p class="eyebrow" data-i18n="adminEyebrow">Administration</p>
        <h1 data-i18n="adminTitle">Gérer les mariages</h1>
        <div class="divider"><span></span></div>
        <p data-i18n="adminSubtitle">Créez un mariage, ajoutez vos invités et leur numéro de table</p>
      </header>

      <div class="card">
        <h2 data-i18n="newWeddingTitle">Nouveau mariage</h2>
        <form id="wedding-form" class="inline-form">
          <input type="text" id="wedding-name" placeholder="Nom du mariage (ex: Mariage de Léa & Tom)" data-i18n-placeholder="weddingNamePlaceholder" required />
          <input type="date" id="wedding-date" />
          <select id="wedding-lang"></select>
          <button type="submit" data-i18n="createBtn">Créer</button>
        </form>
      </div>

      <div class="card">
        <h2 data-i18n="weddingsTitle">Mariages</h2>
        <ul class="wedding-list" id="wedding-list"></ul>
        <p class="empty-state" id="wedding-empty" data-i18n="weddingsEmpty" hidden>Aucun mariage créé pour le moment.</p>
      </div>
    </div>
  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
