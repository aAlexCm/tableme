<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invitation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700&family=Parisienne&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      /* Matches the phone-frame artwork's own screen color (images/phone-frame.png)
         so the iframe blends into the mockup instead of showing as a white box. */
      background: #f2f2f6;
      min-height: 100%;
      font-family: Georgia, 'Times New Roman', serif;
      color: #2c2420;
    }

    #canvas-root {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
    }

    .widget {
      position: absolute;
      touch-action: none;
    }

    .widget-text-content {
      min-width: 24px;
      min-height: 1.2em;
      padding: 4px 6px;
      outline: none;
      white-space: pre-wrap;
    }

    .widget.is-editing .widget-text-content {
      cursor: text;
    }

    .widget:not(.is-editing) .widget-text-content {
      cursor: move;
    }

    .widget.selected {
      outline: 1.5px dashed #2563eb;
    }

    .widget-tag {
      position: absolute;
      top: -22px;
      left: -1px;
      display: none;
      align-items: center;
      gap: 6px;
      padding: 2px 8px;
      border-radius: 4px 4px 0 0;
      background: #2563eb;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .widget.selected .widget-tag {
      display: flex;
    }

    .widget-tag-id {
      opacity: 0.7;
      font-weight: 400;
    }

    .widget-handle {
      position: absolute;
      display: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #2563eb;
      touch-action: none;
    }

    .widget.selected .widget-handle {
      display: block;
    }

    .widget-handle-left {
      left: -6px;
      top: 50%;
      transform: translateY(-50%);
      cursor: ew-resize;
    }

    .widget-handle-right {
      right: -6px;
      top: 50%;
      transform: translateY(-50%);
      cursor: ew-resize;
    }

    .widget-handle-bottom {
      left: 50%;
      bottom: -6px;
      transform: translateX(-50%);
      cursor: ns-resize;
    }
  </style>
</head>
<body>
  <div id="canvas-root"></div>

  <script type="module" src="js/invitation-page.js"></script>
</body>
</html>
