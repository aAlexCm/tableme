<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invitation</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      /* Matches the phone-frame artwork's own screen color (images/phone-frame.png)
         so the iframe blends into the mockup instead of showing as a white box. */
      background: #f2f2f6;
      min-height: 100%;
      font-family: Georgia, 'Times New Roman', serif;
      color: #2c2420;
    }

    #canvas-root {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
    }

    .widget {
      position: absolute;
      touch-action: none;
    }

    .widget-text-content {
      min-width: 24px;
      min-height: 1.2em;
      padding: 4px 6px;
      outline: none;
      white-space: pre-wrap;
    }

    .widget.is-editing .widget-text-content {
      cursor: text;
    }

    .widget:not(.is-editing) .widget-text-content {
      cursor: move;
    }

    .widget.selected {
      outline: 1.5px dashed #2563eb;
    }

    .widget-tag {
      position: absolute;
      top: -22px;
      left: -1px;
      display: none;
      align-items: center;
      gap: 6px;
      padding: 2px 8px;
      border-radius: 4px 4px 0 0;
      background: #2563eb;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .widget.selected .widget-tag {
      display: flex;
    }

    .widget-tag-id {
      opacity: 0.7;
      font-weight: 400;
    }

    .widget-handle {
      position: absolute;
      display: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #2563eb;
      touch-action: none;
    }

    .widget.selected .widget-handle {
      display: block;
    }

    .widget-handle-left {
      left: -6px;
      top: 50%;
      transform: translateY(-50%);
      cursor: ew-resize;
    }

    .widget-handle-right {
      right: -6px;
      top: 50%;
      transform: translateY(-50%);
      cursor: ew-resize;
    }

    .widget-handle-bottom {
      left: 50%;
      bottom: -6px;
      transform: translateX(-50%);
      cursor: ns-resize;
    }

    .text-toolbar {
      position: fixed;
      z-index: 60;
      display: none;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      max-width: calc(100vw - 16px);
      border-radius: 8px;
      background: #1c1c1e;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.3);
      font-family: 'Inter', sans-serif;
    }

    .text-toolbar:not([hidden]) {
      display: flex;
    }

    .text-toolbar button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      padding: 0;
      border: none;
      border-radius: 6px;
      background: none;
      color: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .text-toolbar button:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .text-toolbar button.active {
      background: #2563eb;
    }

    .text-toolbar input[type='number'] {
      width: 46px;
      height: 28px;
      padding: 0 4px;
      border: none;
      border-radius: 6px;
      text-align: center;
      font-size: 0.78rem;
    }

    .text-toolbar input[type='color'] {
      width: 28px;
      height: 28px;
      padding: 2px;
      border: none;
      border-radius: 6px;
      background: none;
    }
  </style>
</head>
<body>
  <div id="canvas-root"></div>

  <div class="text-toolbar" id="text-toolbar" hidden>
    <button type="button" id="bold-btn"><b>B</b></button>
    <button type="button" id="italic-btn"><i>I</i></button>
    <button type="button" id="align-left-btn">&#8676;</button>
    <button type="button" id="align-center-btn">&#8644;</button>
    <button type="button" id="align-right-btn">&#8677;</button>
    <input type="number" id="size-input" min="8" max="120" />
    <input type="color" id="color-input" />
    <button type="button" id="delete-btn">&#10005;</button>
  </div>

  <script type="module" src="js/invitation-page.js"></script>
</body>
</html>
