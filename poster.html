<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>TableMe · Affiche</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700&family=Great+Vibes&family=Parisienne&family=Italiana&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="admin-theme">
  <div class="page page-wide poster-page">
    <div id="lang-switcher-mount" class="lang-switcher-mount"></div>

    <div id="not-found" class="card" hidden>
      <h2 data-i18n="weddingNotFoundTitle">Mariage introuvable</h2>
      <p class="muted" data-i18n="weddingNotFoundDesc">Ce lien n'est pas valide ou ce mariage a été supprimé.</p>
    </div>

    <div id="poster-content" hidden>
      <nav class="admin-nav admin-nav-stacked">
        <strong id="poster-wedding-name"></strong>
        <div class="admin-nav-actions">
          <a href="#" id="poster-back-link" data-i18n="backToAdminLink">&larr; Retour</a>
        </div>
      </nav>

      <div class="poster-workspace">
        <aside class="poster-toolbox">
          <p class="poster-toolbox-title" data-i18n="posterToolboxTitle">Outils</p>
          <div class="poster-toolbox-tools">
            <button type="button" class="poster-tool-btn" id="poster-add-text-btn">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>
              <span data-i18n="posterAddTextBtn">Texte</span>
            </button>
            <button type="button" class="poster-tool-btn" id="poster-add-qr-btn">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 17h3v3h-3z"/><path d="M21 14v3"/><path d="M14 21h3"/></svg>
              <span data-i18n="posterAddQrBtn">QR code</span>
            </button>
            <button type="button" class="poster-tool-btn" id="poster-add-divider-btn">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="2" y1="12" x2="9" y2="12"/><circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"/><line x1="15" y1="12" x2="22" y2="12"/></svg>
              <span data-i18n="posterAddDividerBtn">Séparateur</span>
            </button>
            <button type="button" class="poster-tool-btn" id="poster-add-icon-btn">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-4.35-9.5-8.5C1 9 2 5 5.5 4 8 3.3 10 4.5 12 7c2-2.5 4-3.7 6.5-3 3.5 1 4.5 5 3 8.5C19 16.65 12 21 12 21z"/></svg>
              <span data-i18n="posterAddIconBtn">Icône</span>
            </button>
          </div>
        </aside>

        <div class="poster-canvas-area">
          <div class="poster-bg-field">
            <label for="poster-bg-color-input" data-i18n="posterBgColorLabel">Couleur de la page</label>
            <span class="poster-bg-swatch">
              <svg viewBox="0 0 24 24" width="22" height="22">
                <path d="M5 9 L19 9 L17.3 19.2a2 2 0 0 1-2 1.6h-6.6a2 2 0 0 1-2-1.6L5 9Z" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linejoin="round"/>
                <ellipse cx="12" cy="9" rx="7" ry="2.1" fill="none" stroke="#6b7280" stroke-width="1.5"/>
                <ellipse id="poster-bg-swatch-fill" cx="12" cy="9" rx="5.4" ry="1.3" stroke="#6b7280" stroke-width="0.6"/>
              </svg>
              <input type="color" id="poster-bg-color-input" value="#ffffff" />
            </span>
          </div>

          <div class="poster-sheet" id="poster-sheet">
            <div class="poster-sheet-content" id="poster-sheet-content"></div>
          </div>

          <div class="poster-actions">
            <button type="button" class="secondary" id="poster-download-btn">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
              <span data-i18n="posterDownloadPdfBtn">Télécharger en PDF</span>
            </button>
            <button type="button" id="poster-print-btn">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
              <span data-i18n="posterPrintBtn">Imprimer</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="poster-text-toolbar" id="poster-text-toolbar" hidden>
    <button type="button" class="icon-btn" id="poster-bold-btn"><b>B</b></button>
    <button type="button" class="icon-btn" id="poster-italic-btn"><i>I</i></button>
    <select id="poster-font-select"></select>
    <select id="poster-divider-style-select"></select>
    <select id="poster-icon-symbol-select"></select>
    <input type="number" id="poster-size-input" min="8" max="200" />
    <input type="color" id="poster-color-input" />
    <button type="button" class="icon-btn icon-btn-danger" id="poster-delete-text-btn"></button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script type="module" src="js/poster.js"></script>
</body>
</html>
