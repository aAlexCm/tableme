<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trouver ma table</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1 id="wedding-title">Trouver ma table</h1>
      <p id="wedding-subtitle">Tapez votre nom pour découvrir votre table</p>
    </header>

    <div id="no-wedding" class="card" hidden>
      <h2>Choisissez un mariage</h2>
      <p class="muted">Aucun mariage n'est précisé dans le lien. Sélectionnez-en un ci-dessous.</p>
      <ul class="wedding-list" id="wedding-picker"></ul>
      <p class="empty-state" id="no-wedding-empty" hidden>Aucun mariage n'a encore été créé.</p>
    </div>

    <div id="search-section" class="card" hidden>
      <input
        type="text"
        id="guest-input"
        placeholder="Votre nom et prénom..."
        autocomplete="off"
      />

      <div id="result" class="result" hidden></div>
      <ul id="match-list" class="guest-list"></ul>
    </div>
  </div>

  <script type="module" src="js/guest.js"></script>
</body>
</html>
