<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trouver ma table</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Parisienne&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page">
    <div id="lang-switcher-mount" class="lang-switcher-mount"></div>

    <header class="hero invite-hero">
      <h1 id="wedding-title" class="script-title" data-i18n="guestHeroTitle">Trouver ma table</h1>
      <p id="wedding-subtitle" class="tracked-subtitle" data-i18n="guestSubtitle">Tapez votre nom pour découvrir votre table</p>
    </header>

    <div id="no-wedding" class="card" hidden>
      <h2 data-i18n="noWeddingTitle">Choisissez un mariage</h2>
      <p class="muted" data-i18n="noWeddingDesc">Aucun mariage n'est précisé dans le lien. Sélectionnez-en un ci-dessous.</p>
      <ul class="wedding-list" id="wedding-picker"></ul>
      <p class="empty-state" id="no-wedding-empty" data-i18n="noWeddingEmpty" hidden>Aucun mariage n'a encore été créé.</p>
    </div>

    <div id="search-section" class="card" hidden>
      <input
        type="text"
        id="guest-input"
        placeholder="Votre nom et prénom..."
        data-i18n-placeholder="searchPlaceholder"
        autocomplete="off"
      />

      <div id="result" class="result" hidden></div>
      <ul id="match-list" class="guest-list"></ul>
    </div>
  </div>

  <script type="module" src="js/guest.js"></script>
</body>
</html>
