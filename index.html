<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>TableMe · Trouver ma table</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Parisienne&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="guest-theme">
  <div class="page">
    <div id="lang-switcher-mount" class="lang-switcher-mount"></div>

    <header class="hero invite-hero">
      <h1 id="wedding-title" class="script-title"></h1>
      <p id="wedding-subtitle" class="tracked-subtitle" data-i18n="guestSubtitle">Tapez votre nom pour découvrir votre table</p>
    </header>

    <div id="no-wedding" class="card" hidden>
      <h2 data-i18n="invalidLinkTitle">Lien invalide</h2>
      <p class="muted" data-i18n="invalidLinkDesc">Ce lien n'est pas valide. Merci d'utiliser le lien fourni par les mariés.</p>
    </div>

    <div id="search-section" class="card" hidden>
      <div class="search-field">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input
          type="text"
          id="guest-input"
          placeholder="Votre nom et prénom..."
          data-i18n-placeholder="searchPlaceholder"
          autocomplete="off"
        />
        <button type="button" class="icon-btn search-clear-btn" id="search-clear-btn" aria-label="Effacer" hidden><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg></button>
      </div>

      <div id="result" class="result" hidden></div>
      <ul id="match-list" class="guest-list"></ul>
    </div>
  </div>

  <script type="module" src="js/guest.js"></script>
</body>
</html>
