<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>TableMe · Liste des tâches</title>
  <meta property="og:title" content="TableMe · Liste des tâches" />
  <meta property="og:description" content="The wedding to-do list." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://tableme.app/todo" />
  <meta property="og:image" content="https://tableme.app/og-image.png" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="TableMe · Liste des tâches" />
  <meta name="twitter:description" content="The wedding to-do list." />
  <meta name="twitter:image" content="https://tableme.app/og-image.png" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="admin-theme">
  <div class="page page-wide">
    <div id="lang-switcher-mount" class="lang-switcher-mount"></div>

    <div id="not-found" class="card" hidden>
      <h2 data-i18n="weddingNotFoundTitle">Mariage introuvable</h2>
      <p class="muted" data-i18n="weddingNotFoundDesc">Ce lien n'est pas valide ou ce mariage a été supprimé.</p>
    </div>

    <div id="todo-content" hidden>
      <nav class="admin-nav admin-nav-stacked">
        <strong id="todo-wedding-name"></strong>
        <div class="admin-nav-actions">
          <a href="#" id="todo-back-link" data-i18n="backToAdminLink">&larr; Retour</a>
        </div>
      </nav>

      <div class="card todo-card">
        <h2 data-i18n="todoPageTitle">Liste des tâches</h2>

        <div class="todo-progress">
          <p class="todo-progress-label" id="todo-progress-label"></p>
          <div class="todo-progress-bar">
            <div class="todo-progress-fill" id="todo-progress-fill"></div>
          </div>
        </div>

        <form id="todo-add-form" class="todo-add-form">
          <button type="submit" class="todo-add-icon" id="todo-add-btn" aria-label="Ajouter une tâche">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          </button>
          <input type="text" id="todo-add-input" data-i18n-placeholder="todoAddPlaceholder" placeholder="Créer une nouvelle tâche..." />
        </form>

        <ul class="todo-list" id="todo-list"></ul>

        <p class="empty-state todo-empty-state" id="todo-empty-state" data-i18n="todoEmptyState" hidden>Aucune tâche pour l'instant. Ajoutez-en une ci-dessus !</p>
      </div>
    </div>
  </div>

  <script type="module" src="js/todo.js"></script>
</body>
</html>
